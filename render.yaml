services:
  - type: web
    name: finservice-bot-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        scope: build
        sync: false
      - key: ADMIN_IDS
        scope: build
        sync: false
      - key: SESSION_SECRET
        scope: build
        sync: false
    healthCheckPath: /
    numInstances: 1
    
  - type: background_worker
    name: finservice-bot-scheduler
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python schedular.py --continuous --interval 1.6
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        scope: build
        sync: false
      - key: DATABASE_URL
        scope: build
        sync: false
    numInstances: 1
